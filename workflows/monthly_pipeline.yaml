# ================================================================
# monthly_pipeline.yaml
#
# Triggered by Cloud Scheduler on the 1st of every month at 02:00 UTC.
# ML training only — gold tables already exist from the daily batch pipeline.
#
# Runs: ml_train + ml_trajectory + ml_language_trends (parallel)
#       → ml_score (scores all repos with freshly trained model)
#
# Terraform injects: project_id, region, prefix, scripts_bucket, dataproc_sa, bq_dataset
# String literals inside $${...} must use double quotes (Cloud Workflows syntax).
# ================================================================

main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: "${project_id}"
          - region: "${region}"
          - prefix: "${prefix}"
          - scripts_bucket: "${scripts_bucket}"
          - dataproc_sa: "${dataproc_sa}"
          - bq_dataset: "${bq_dataset}"
          - cluster_name: $${prefix + "-monthly-" + string(int(sys.now()))}
          - pipeline_error: null

    - run_pipeline:
        try:
          steps:
            - create_cluster:
                call: create_dataproc_cluster
                args:
                  project_id: $${project_id}
                  region: $${region}
                  cluster_name: $${cluster_name}
                  scripts_bucket: $${scripts_bucket}
                  dataproc_sa: $${dataproc_sa}

            - run_ml_parallel:
                parallel:
                  branches:
                    - branch_train:
                        steps:
                          - submit_train:
                              call: submit_pyspark_job
                              args:
                                project_id: $${project_id}
                                region: $${region}
                                cluster_name: $${cluster_name}
                                scripts_bucket: $${scripts_bucket}
                                script: ml_train.py
                                job_args:
                                  - "--prefix"
                                  - $${prefix}
                                  - "--project_id"
                                  - $${project_id}
                                  - "--bq_dataset"
                                  - $${bq_dataset}
                              result: train_job_id
                    - branch_trajectory:
                        steps:
                          - submit_trajectory:
                              call: submit_pyspark_job
                              args:
                                project_id: $${project_id}
                                region: $${region}
                                cluster_name: $${cluster_name}
                                scripts_bucket: $${scripts_bucket}
                                script: ml_trajectory.py
                                job_args:
                                  - "--prefix"
                                  - $${prefix}
                                  - "--project_id"
                                  - $${project_id}
                                  - "--bq_dataset"
                                  - $${bq_dataset}
                              result: traj_job_id
                    - branch_language:
                        steps:
                          - submit_language:
                              call: submit_pyspark_job
                              args:
                                project_id: $${project_id}
                                region: $${region}
                                cluster_name: $${cluster_name}
                                scripts_bucket: $${scripts_bucket}
                                script: ml_language_trends.py
                                job_args:
                                  - "--prefix"
                                  - $${prefix}
                                  - "--project_id"
                                  - $${project_id}
                                  - "--bq_dataset"
                                  - $${bq_dataset}
                              result: lang_job_id

            - run_ml_score:
                call: submit_pyspark_job
                args:
                  project_id: $${project_id}
                  region: $${region}
                  cluster_name: $${cluster_name}
                  scripts_bucket: $${scripts_bucket}
                  script: ml_score.py
                  job_args:
                    - "--prefix"
                    - $${prefix}
                    - "--project_id"
                    - $${project_id}
                    - "--bq_dataset"
                    - $${bq_dataset}
                result: score_job_id

        except:
          as: e
          steps:
            - capture_error:
                assign:
                  - pipeline_error: $${e}

    - cleanup_cluster:
        call: delete_dataproc_cluster
        args:
          project_id: $${project_id}
          region: $${region}
          cluster_name: $${cluster_name}

    - check_error:
        switch:
          - condition: $${pipeline_error != null}
            raise: $${pipeline_error}
        next: done

    - done:
        return:
          status: monthly_ml_training_complete


# ── Subworkflow: Create Dataproc cluster ─────────────────────
create_dataproc_cluster:
  params: [project_id, region, cluster_name, scripts_bucket, dataproc_sa]
  steps:
    - init_poll_counter:
        assign:
          - cluster_poll_count: 0
          - max_cluster_polls: 15

    - create:
        call: http.post
        args:
          url: $${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/regions/" + region + "/clusters"}
          auth:
            type: OAuth2
          body:
            projectId: $${project_id}
            clusterName: $${cluster_name}
            config:
              masterConfig:
                numInstances: 1
                machineTypeUri: e2-standard-2
                diskConfig:
                  bootDiskSizeGb: 100
              workerConfig:
                numInstances: 2
                machineTypeUri: e2-standard-2
                diskConfig:
                  bootDiskSizeGb: 100
              softwareConfig:
                imageVersion: 2.1-debian11
                properties:
                  spark:spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
                  spark:spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog
              lifecycleConfig:
                idleDeleteTtl: 1800s
              gceClusterConfig:
                zoneUri: us-central1-a
                serviceAccount: $${dataproc_sa}
                serviceAccountScopes:
                  - https://www.googleapis.com/auth/cloud-platform
              initializationActions:
                - executableFile: $${"gs://" + scripts_bucket + "/init_cluster.sh"}
                  executionTimeout: 600s
        result: create_resp

    - poll_cluster_running:
        call: sys.sleep
        args:
          seconds: 60

    - increment_cluster_poll:
        assign:
          - cluster_poll_count: $${cluster_poll_count + 1}

    - check_cluster_timeout:
        switch:
          - condition: $${cluster_poll_count >= max_cluster_polls}
            raise: $${"Cluster creation timed out after " + string(max_cluster_polls) + " minutes"}

    - get_cluster_status:
        call: http.get
        args:
          url: $${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/regions/" + region + "/clusters/" + cluster_name}
          auth:
            type: OAuth2
        result: cluster_resp

    - check_cluster_state:
        switch:
          - condition: $${cluster_resp.body.status.state == "RUNNING"}
            return: $${cluster_name}
          - condition: $${cluster_resp.body.status.state == "ERROR"}
            raise: $${"Cluster failed to start - " + default(map.get(cluster_resp.body.status, "detail"), default(map.get(cluster_resp.body.status, "substate"), "unknown error"))}
        next: poll_cluster_running


# ── Subworkflow: Submit PySpark job and wait ─────────────────
submit_pyspark_job:
  params: [project_id, region, cluster_name, scripts_bucket, script, job_args]
  steps:
    - init_job_poll:
        assign:
          - job_poll_count: 0
          - max_job_polls: 120

    - submit:
        call: http.post
        args:
          url: $${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/regions/" + region + "/jobs:submit"}
          auth:
            type: OAuth2
          body:
            job:
              placement:
                clusterName: $${cluster_name}
              pysparkJob:
                mainPythonFileUri: $${"gs://" + scripts_bucket + "/" + script}
                args: $${job_args}
        result: job_resp

    - capture_job_id:
        assign:
          - job_id: $${job_resp.body.reference.jobId}

    - poll_job:
        call: sys.sleep
        args:
          seconds: 30

    - increment_job_poll:
        assign:
          - job_poll_count: $${job_poll_count + 1}

    - check_job_timeout:
        switch:
          - condition: $${job_poll_count >= max_job_polls}
            raise: $${"Job " + script + " timed out after " + string(max_job_polls * 30) + " seconds"}

    - get_job_status:
        call: http.get
        args:
          url: $${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/regions/" + region + "/jobs/" + job_id}
          auth:
            type: OAuth2
        result: job_status_resp

    - check_job_state:
        switch:
          - condition: $${job_status_resp.body.status.state == "DONE"}
            return: $${job_id}
          - condition: $${job_status_resp.body.status.state == "ERROR"}
            raise: $${"Job " + script + " failed - " + job_status_resp.body.status.details}
          - condition: $${job_status_resp.body.status.state == "CANCELLED"}
            raise: $${"Job " + script + " was cancelled"}
        next: poll_job


# ── Subworkflow: Delete cluster ───────────────────────────────
delete_dataproc_cluster:
  params: [project_id, region, cluster_name]
  steps:
    - delete:
        try:
          call: http.delete
          args:
            url: $${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/regions/" + region + "/clusters/" + cluster_name}
            auth:
              type: OAuth2
          result: delete_resp
        except:
          as: e
          steps:
            - handle_delete_error:
                switch:
                  - condition: $${e.code == 404}
                    next: done
                next: reraise_delete_error
            - reraise_delete_error:
                raise: $${e}
    - done:
        return: cluster_deleted
